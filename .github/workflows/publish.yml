name: Publish to npm

on:
  push:
    branches:
      - main   # 仅在 main 分支推送时触发发布流程

jobs:
  publish:
    # 在 Windows Runner 上执行发布流程
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 需要至少 2 个提交，后续才能比较 HEAD 与 HEAD^
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # 使用固定 Node 版本，避免环境差异
          node-version: 20
          # 配置 npm 官方仓库地址，供 npm publish 使用
          registry-url: https://registry.npmjs.org/

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # 与 packageManager 中声明的 pnpm 版本保持一致
          version: 10.33.0

      - name: Check version change
        id: version_check
        run: |
          # 读取上一提交与当前提交的 package.json 版本号
          $oldVersion = git show HEAD^:package.json | node -pe "JSON.parse(fs.readFileSync(0)).version"
          $newVersion = node -pe "require('./package.json').version"

          Write-Host "Old: $oldVersion"
          Write-Host "New: $newVersion"

          # 通过 GITHUB_OUTPUT 向后续步骤输出布尔结果
          if ($oldVersion -eq $newVersion) {
            "changed=false" >> $env:GITHUB_OUTPUT
          } else {
            "changed=true" >> $env:GITHUB_OUTPUT
          }

      - name: Publish
        # 仅当 package.json 版本号发生变化时才执行发布
        if: steps.version_check.outputs.changed == 'true'
        run: pnpm publish --no-git-checks
        env:
          # npm 发布令牌（需在仓库 Secrets 中配置 NPM_TOKEN）
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}